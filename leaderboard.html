<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BogHopper — Leaderboard</title>
<style>
  :root {
    --panel: rgba(18, 24, 20, 0.72);
    --ink: #f2ede2;
    --accent: #e8a33d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background: radial-gradient(ellipse at 50% 30%, #1d2a22, #0b100d);
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 20px 64px; gap: 22px; text-align: center;
  }
  h1 {
    font-size: 44px; letter-spacing: 4px; font-weight: 800;
    text-shadow: 0 3px 0 #3c2f1e, 0 8px 24px rgba(0,0,0,.7);
  }
  h1 span { color: var(--accent); }
  .sub { font-size: 14px; opacity: .8; margin-top: -12px; }
  table {
    border-collapse: collapse; min-width: min(440px, 90vw);
    background: var(--panel); border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px; overflow: hidden; backdrop-filter: blur(4px);
  }
  th {
    font-size: 11px; letter-spacing: 2px; opacity: .7; font-weight: 600;
    padding: 12px 18px 6px; text-align: left;
  }
  td {
    padding: 9px 18px; text-align: left; font-size: 16px;
    border-top: 1px solid rgba(255,255,255,.06);
    font-variant-numeric: tabular-nums;
  }
  td.rank { opacity: .7; width: 52px; }
  td.dist { text-align: right; font-weight: 600; }
  tr.me td {
    color: var(--accent); font-weight: 700;
    background: rgba(232, 163, 61, 0.08);
  }
  tr.gap td { text-align: center; opacity: .5; padding: 4px; border-top: none; }
  tr:first-child .rank::before { content: "🥇 "; }
  tr:nth-child(2) .rank::before { content: "🥈 "; }
  tr:nth-child(3) .rank::before { content: "🥉 "; }
  .empty { font-size: 15px; opacity: .75; padding: 26px; }
  a.btn {
    display: inline-block; text-decoration: none;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
    color: #1c1509; background: var(--accent);
    border-radius: 10px; padding: 13px 42px;
    box-shadow: 0 4px 0 #9a6a1e, 0 8px 20px rgba(0,0,0,.5);
    transition: transform .08s;
  }
  a.btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <h1>HALL OF <span>FAME</span></h1>
  <div class="sub">the furthest anyone has made it across the moor</div>
  <div id="board"><div class="empty">loading…</div></div>
  <a class="btn" href="/">BACK TO THE HILL</a>

<script>
(async () => {
  const board = document.getElementById('board');
  try {
    const res = await fetch('api/leaderboard' + location.search, { cache: 'no-store' });
    const { top, me } = await res.json();
    if (!top.length) {
      board.innerHTML = '<div class="empty">No names on the board yet — be the first to survive the bog.</div>';
      return;
    }
    const meId = new URLSearchParams(location.search).get('me');
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>RANK</th><th>RUNNER</th><th style="text-align:right">DISTANCE</th></tr></thead>';
    const tbody = document.createElement('tbody');
    const addRow = (r, isMe) => {
      const tr = document.createElement('tr');
      if (isMe) tr.className = 'me';
      const rank = document.createElement('td');
      rank.className = 'rank';
      rank.textContent = r.rank;
      const name = document.createElement('td');
      name.textContent = r.name;               // untrusted — text only
      const dist = document.createElement('td');
      dist.className = 'dist';
      dist.textContent = r.dist + ' m';
      tr.append(rank, name, dist);
      tbody.appendChild(tr);
    };
    for (const r of top) addRow(r, meId && r.id === Number(meId));
    if (me) {
      const gap = document.createElement('tr');
      gap.className = 'gap';
      gap.innerHTML = '<td colspan="3">⋯</td>';
      tbody.appendChild(gap);
      addRow(me, true);
    }
    table.appendChild(tbody);
    board.replaceChildren(table);
  } catch {
    board.innerHTML = '<div class="empty">Could not reach the leaderboard.</div>';
  }
})();
</script>
</body>
</html>
